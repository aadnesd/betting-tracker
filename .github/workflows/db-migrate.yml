name: DB Migrate

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Target environment"
        required: true
        default: production
        type: choice
        options:
          - production
          - preview

permissions:
  contents: read

jobs:
  migrate:
    name: Run Drizzle migrations
    runs-on: ubuntu-latest
    environment: ${{ inputs.target }}
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate DB secret
        run: |
          if [ -z "${POSTGRES_URL_NON_POOLING}" ]; then
            echo "POSTGRES_URL_NON_POOLING is not set for environment '${{ inputs.target }}'."
            exit 1
          fi
        env:
          POSTGRES_URL_NON_POOLING: ${{ secrets.POSTGRES_URL_NON_POOLING }}

      - name: Run migration
        run: pnpm db:migrate
        env:
          POSTGRES_URL_NON_POOLING: ${{ secrets.POSTGRES_URL_NON_POOLING }}
